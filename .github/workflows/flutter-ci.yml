name: TravelPass - Continuous Integration

# Run this pipeline on every push and pull request
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Core Test Suite (Unit, Widget, API)
  # Runs on every push. Fast, headless, no emulator needed.
  # ─────────────────────────────────────────────────────────────────────────────
  unit-widget-api-tests:
    name: 🧪 Unit | Widget | API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Static Code Analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # ── Unit Tests: Models ─────────────────────────────────────────────────
      - name: 🔷 Unit Tests — Data Models (7 suites)
        run: |
          flutter test test/unit/PassengerModel_test.dart \
                       test/unit/DriverModel_test.dart \
                       test/unit/AttendanceModel_test.dart \
                       test/unit/PollModel_test.dart \
                       test/unit/RedemptionModel_test.dart \
                       test/unit/UpdateModel_test.dart \
                       test/unit/UserModel_test.dart \
                       --reporter compact

      # ── Unit Tests: Services ───────────────────────────────────────────────
      - name: 🔷 Unit Tests — Auth Service
        run: flutter test test/unit/AuthService_test.dart --reporter compact

      # ── Unit Tests: Controllers ────────────────────────────────────────────
      - name: 🔷 Unit Tests — Controllers (13 suites)
        run: |
          flutter test test/unit/AccessController_test.dart \
                       test/unit/AttendanceHistoryController_test.dart \
                       test/unit/AuthController_test.dart \
                       test/unit/DriverAttendanceController_test.dart \
                       test/unit/DriverDashboardController_test.dart \
                       test/unit/PassengerController_test.dart \
                       test/unit/PassengerEditDetailsController_test.dart \
                       test/unit/RegisterPassengerController_test.dart \
                       test/unit/SettingsController_test.dart \
                       test/unit/TodayPassengersController_test.dart \
                       test/unit/UpdatesController_test.dart \
                       test/unit/VoiceAssistantController_test.dart \
                       --reporter compact

      # ── Unit Tests: Utilities ──────────────────────────────────────────────
      - name: 🔷 Unit Tests — Utility Classes
        run: flutter test test/unit/AuthExceptionHandler_test.dart --reporter compact

      # ── API / Service Integration Tests (HTTP & Firebase Functions mocked) ─
      - name: 🌐 API Tests — WeatherService + PlaceService + GeminiService
        run: |
          flutter test test/api/WeatherService_test.dart \
                       test/api/GeminiService_test.dart \
                       --reporter compact

      - name: 🔷 Unit Tests — PlaceService (HTTP Mock)
        run: flutter test test/unit/PlaceService_test.dart --reporter compact

      # ── Widget Tests ───────────────────────────────────────────────────────
      - name: 🎨 Widget Tests — UI Components (23 suites)
        run: |
          flutter test test/widget/BottomBar_test.dart \
                       test/widget/Cards_test.dart \
                       test/widget/CustomSnackBar_test.dart \
                       test/widget/DriverDashboard_test.dart \
                       test/widget/DriverPaymentReminders_test.dart \
                       test/widget/DriverPoll_test.dart \
                       test/widget/DriverRegistration_test.dart \
                       test/widget/DriverSettings_test.dart \
                       test/widget/DriverUpdateRoute_test.dart \
                       test/widget/DriverAttendanceHistory_test.dart \
                       test/widget/DriverCashHistory_test.dart \
                       test/widget/DriverPassengers_test.dart \
                       test/widget/DriverTodayPassengers_test.dart \
                       test/widget/DriverPaymentDetails_test.dart \
                       test/widget/Header_test.dart \
                       test/widget/InputTexts_test.dart \
                       test/widget/JourneyInfoCard_test.dart \
                       test/widget/LoginPage_test.dart \
                       test/widget/PassengerDashboard_test.dart \
                       test/widget/PassengerPaymentHistory_test.dart \
                       test/widget/PassengerRegistration_test.dart \
                       test/widget/PassengerSettings_test.dart \
                       test/widget/PassengerUpdates_test.dart \
                       test/widget/RegisterPage_test.dart \
                       test/widget/Topic_test.dart \
                       test/widget/UserSelection_test.dart \
                       test/widget/VehicleRegistration_test.dart \
                       test/widget/WhiteCard_test.dart \
                       --reporter compact

      - name: 🎨 Widget Tests — Smoke Test
        run: flutter test test/Widget_test.dart --reporter compact

      # ── Full Recursive Run (Safety net — catches anything missed above) ────
      - name: ✅ Full Recursive Test Suite (All test/ files)
        run: flutter test test/ --reporter compact

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Integration & E2E Tests
  # Runs the login flow and app navigation tests in the Dart VM tester.
  # ─────────────────────────────────────────────────────────────────────────────
  integration-e2e-tests:
    name: 🏗️ Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: unit-widget-api-tests  # Only run if unit tests pass first
    defaults:
      run:
        working-directory: project

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ E2E Test — Login User Flow & Navigation
        run: flutter test integration_test/App_test.dart -d flutter-tester

      - name: ⏱️ Performance Test — Scroll & Render Profiling
        run: flutter test integration_test/Performance_test.dart -d flutter-tester
